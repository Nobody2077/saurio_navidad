name: saurio_navidad
description: SaurioNavidad, un arbol de recuerdos con mascota, cofre y diciembre magico.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  audioplayers: ^6.6.0
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  image_picker: ^1.2.1
  path_provider: ^2.1.5
  flutter_local_notifications: ^18.0.0
  record: ^6.2.0
  shared_preferences: ^2.5.5
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/saurio/cozy/
    - assets/saurio/excited/
    - assets/saurio/recording/
    - assets/saurio/photo/
    - assets/saurio/surprise/
